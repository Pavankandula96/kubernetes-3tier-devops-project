apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
      - name: flask-backend
        image: 930487733034.dkr.ecr.ap-south-1.amazonaws.com/flask-backend:latest
        ports:
        - containerPort: 5000